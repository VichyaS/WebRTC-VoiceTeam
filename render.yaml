# Render Deployment Configuration
# This file tells Render how to run the Voice Team app

services:
  - type: web
    name: voice-team
    env: node
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
      - key: RENDER
        value: "true"
      - key: NODE_ENV
        value: production
      # ── Okta OIDC (ถ้ามี) ──
      # - key: OIDC_ISSUER
      #   value: https://your-org.okta.com
      # - key: OIDC_CLIENT_ID
      #   value: your-client-id
      # - key: OIDC_CLIENT_SECRET
      #   value: your-client-secret
      # - key: OIDC_CALLBACK_URL
      #   value: https://your-app.onrender.com/api/auth/callback
      # ── LDAP/AD (ถ้ามี) ──
      # - key: LDAP_URL
      #   value: ldap://your-ad-server:389
      # - key: LDAP_BASE_DN
      #   value: dc=yourcompany,dc=com
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
      - path: /*
        name: X-XSS-Protection
        value: 1; mode=block
      - path: /*
        name: Permissions-Policy
        value: microphone=(self), camera=(self), speaker=(self)
