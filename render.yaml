# Render Deployment Configuration
# This file tells Render how to run the Voice Team app

services:
  - type: web
    name: voice-team
    env: node
    buildCommand: ""
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 10000
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: Referrer-Policy
        value: no-referrer
      - path: /*
        name: Strict-Transport-Security
        value: max-age=31536000; includeSubDomains
