<!DOCTYPE html>
<!--
    Voice Team - Click to Call Widget
-->
<html>

<head>
    <title>Voice Team - Click to Call</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; media-src 'self' blob:; img-src 'self' data: blob:; connect-src 'self' ws: wss: https:; font-src 'self' https://fonts.gstatic.com; form-action 'self'">
    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <link rel="stylesheet" href="../css/c2c.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%F0%9F%93%9E%3C/text%3E%3C/svg%3E">

    <script defer src="../conf/config.js"></script>
    <script defer src="../js/ac_webrtc.min.js"></script>
    <script defer src="../js/c2c_utils.js"></script>
    <script defer src="../js/c2c.js"></script>
</head>

<body>
    <div class="vct-phone-frame">
        <!-- Top bar with logo and settings -->
        <div class="vct-top-bar">
            <div class="vct-logo">
                <div class="vct-logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="5" y="2" width="14" height="20" rx="3"/>
                        <line x1="12" y1="17" x2="12" y2="18"/>
                        <line x1="9" y1="6" x2="15" y2="6"/>
                        <path d="M17 11q3 0 3-3M4 11q-3 0-3-3M17 16q5 0 5-5M4 16q-5 0-5-5"/>
                    </svg>
                </div>
                <div>
                    <span class="vct-logo-text">Voice <strong>Team</strong></span>
                    <span class="vct-logo-text-sub">Click to Call</span>
                </div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;">
                <button id="c2c_login_btn" class="vct-settings-btn" title="Sign In" style="display:none;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                        <polyline points="10 17 15 12 10 7"/>
                        <line x1="15" y1="12" x2="3" y2="12"/>
                    </svg>
                </button>
                <button id="c2c_user_btn" class="vct-settings-btn" title="User menu" style="display:none;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                </button>
                <button id="c2c_debug_btn" class="vct-settings-btn" title="Debug Log">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
                    </svg>
                </button>
                <button id="c2c_settings_btn" class="vct-settings-btn" title="Settings">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                </button>
            </div>
        </div>

        <!-- Status / connection info -->
        <div id="c2c_connection_speed_div" class="vct-status-badge"></div>

        <!-- User Menu Modal -->
        <div id="c2c_user_menu_modal" class="vct-modal-overlay" style="display:none;">
            <div class="vct-modal-content" style="max-width:340px;">
                <div class="vct-modal-header">
                    <h3>Account</h3>
                    <button id="c2c_user_menu_close_btn" class="vct-icon-btn" aria-label="Close">&times;</button>
                </div>
                <div class="vct-modal-body">
                    <div style="text-align:center;margin-bottom:16px;">
                        <div style="width:64px;height:64px;background:linear-gradient(135deg,var(--primary),var(--primary-dark));border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">
                            <svg viewBox="0 0 24 24" width="32" height="32" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                        <div id="c2c_user_display_name" style="font-size:18px;font-weight:700;color:var(--text-primary);">User</div>
                        <div id="c2c_user_username" style="font-size:13px;color:var(--text-tertiary);margin-top:4px;">@username</div>
                    </div>
                    <div id="c2c_user_attributes" style="background:rgba(255,255,255,0.04);border-radius:12px;padding:12px 16px;margin-bottom:16px;font-size:12px;color:var(--text-secondary);line-height:1.8;">
                        <div><strong>Domain:</strong> <span id="c2c_attr_domain">-</span></div>
                        <div><strong>Addresses:</strong> <span id="c2c_attr_addresses">-</span></div>
                        <div><strong>Call:</strong> <span id="c2c_attr_call">-</span></div>
                        <div><strong>Caller:</strong> <span id="c2c_attr_caller">-</span></div>
                        <div><strong>CallerDN:</strong> <span id="c2c_attr_callerDN">-</span></div>
                    </div>
                    <button id="c2c_logout_btn" class="vct-btn" style="width:100%;background:rgba(255,69,58,0.15);color:var(--danger);border:1px solid rgba(255,69,58,0.2);border-radius:12px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:all 0.2s;">
                        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="vertical-align:middle;margin-right:6px;">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                            <polyline points="16 17 21 12 16 7"/>
                            <line x1="21" y1="12" x2="9" y2="12"/>
                        </svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </div>

        <!-- Settings Modal -->
        <div id="c2c_settings_modal" class="vct-modal-overlay" style="display:none;">
            <div class="vct-modal-content">
                <div class="vct-modal-header">
                    <h3>Settings</h3>
                    <button id="c2c_settings_close_btn" class="vct-icon-btn" aria-label="Close">&times;</button>
                </div>
                <div class="vct-modal-body">
                    <label class="vct-field">
                        <span>SBC Domain</span>
                        <input type="text" id="cfg_domain" placeholder="e.g. sbc.example.com">
                    </label>
                    <label class="vct-field">
                        <span>SBC WebSocket Address</span>
                        <input type="text" id="cfg_addresses" placeholder="e.g. wss://webrtclab.audiocodes.com">
                    </label>
                    <label class="vct-field">
                        <span>Call User / Number</span>
                        <input type="text" id="cfg_call" placeholder="e.g. 1000">
                    </label>
                    <label class="vct-field">
                        <span>Caller Name</span>
                        <input type="text" id="cfg_caller" placeholder="Anonymous">
                    </label>
                    <label class="vct-field">
                        <span>Caller Display Name</span>
                        <input type="text" id="cfg_callerDN" placeholder="Display name">
                    </label>
                    <label class="vct-field">
                        <span>Call Type</span>
                        <select id="cfg_type">
                            <option value="audio">Audio only</option>
                            <option value="video">Video</option>
                            <option value="user_control">User Control</option>
                        </select>
                    </label>

                    <label class="vct-field vct-field-checkbox">
                        <span>Auto Start Call</span>
                        <input type="checkbox" id="cfg_callAutoStart">
                    </label>
                    <label class="vct-field vct-field-checkbox">
                        <span>Select Devices Enabled</span>
                        <input type="checkbox" id="cfg_selectDevicesEnabled" checked>
                    </label>
                    <label class="vct-field vct-field-checkbox">
                        <span>DTMF Keypad Enabled</span>
                        <input type="checkbox" id="cfg_dtmfKeypadEnabled" checked>
                    </label>
                    <label class="vct-field vct-field-checkbox">
                        <span>Screen Sharing Enabled</span>
                        <input type="checkbox" id="cfg_screenSharingEnabled" checked>
                    </label>
                    <label class="vct-field vct-field-checkbox">
                        <span>Self Video Enabled</span>
                        <input type="checkbox" id="cfg_selfVideoEnabled" checked>
                    </label>
                </div>
                <div class="vct-modal-footer">
                    <button id="c2c_settings_save_btn" class="vct-btn vct-btn-primary">Save & Apply</button>
                </div>
            </div>
        </div>

        <!-- Widget -->
        <div id="c2c_widget_div" class="vct-widget">

            <!-- Device / Keypad / Screen / Test buttons row -->
            <div class="vct-toolbar">
                <button id="c2c_select_devices_btn" class="vct-tool-btn" title="Select devices (mic, camera, speaker)">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
                    </svg>
                    <span>Devices</span>
                </button>
                <button id="c2c_keypad_btn" class="vct-tool-btn" title="Open keypad">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
                        <rect x="6" y="4" width="3" height="3" rx="0.5"/><rect x="10.5" y="4" width="3" height="3" rx="0.5"/><rect x="15" y="4" width="3" height="3" rx="0.5"/>
                        <rect x="6" y="8.5" width="3" height="3" rx="0.5"/><rect x="10.5" y="8.5" width="3" height="3" rx="0.5"/><rect x="15" y="8.5" width="3" height="3" rx="0.5"/>
                        <rect x="6" y="13" width="3" height="3" rx="0.5"/><rect x="10.5" y="13" width="3" height="3" rx="0.5"/><rect x="15" y="13" width="3" height="3" rx="0.5"/>
                        <rect x="10.5" y="17.5" width="3" height="3" rx="0.5"/>
                    </svg>
                    <span>Keypad</span>
                </button>
                <button id="c2c_screen_sharing_btn" class="vct-tool-btn" title="Start screen sharing">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="8" y1="22" x2="16" y2="22"/>
                    </svg>
                    <span>Screen</span>
                </button>
                <button id="c2c_device_test_btn" class="vct-tool-btn" title="Test microphone, speaker & camera">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" y1="19" x2="12" y2="23"/>
                        <line x1="8" y1="23" x2="16" y2="23"/>
                    </svg>
                    <span>Mic/Cam</span>
                </button>
            </div>

            <!-- Video area -->
            <div id="c2c_video_div" class="vct-video-area">
                <video id="c2c_local_video" autoplay playsinline muted></video>
                <video id="c2c_remote_video" autoplay playsinline></video>
            </div>

            <!-- Status line -->
            <div id="c2c_status_line" class="vct-status-line"></div>

            <!-- Call button -->
            <button id="c2c_call_btn" class="vct-call-btn" title="Click to call">
                <svg class="vct-call-btn-icon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6.62 10.79a15.05 15.05 0 006.59 6.59l2.2-2.2a1 1 0 011.01-.24c1.12.37 2.33.57 3.57.57a1 1 0 011 1V20a1 1 0 01-1 1A17 17 0 013 4a1 1 0 011-1h3.5a1 1 0 011 1c0 1.25.2 2.45.57 3.57a1 1 0 01-.25 1.02l-2.2 2.2z"/>
                </svg>
                <span class="vct-call-btn-label" id="c2c_call_btn_text">Call</span>
            </button>

            <!-- Video + self toggles (before call) -->
            <div class="vct-options-row">
                <label id="c2c_video_chk_span" class="vct-toggle-label">
                    <input id="c2c_video_chk" type="checkbox"> <span>Video</span>
                </label>
                <button id="c2c_camera_btn" class="vct-cam-btn" title="Toggle camera">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                        <line id="c2c_camera_line_svg" x1="2" y1="2" x2="22" y2="22" stroke-width="2" stroke="none"/>
                    </svg>
                </button>
                <label id="c2c_self_video_chk_span" class="vct-toggle-label">
                    <input id="c2c_self_video_chk" type="checkbox"> <span>Self</span>
                </label>
            </div>

            <!-- Select devices panel -->
            <div id="c2c_select_devices_div" class="vct-devices-panel">
                <form id="c2c_devices" onsubmit="event.preventDefault()">
                    <div id="microphone_dev" class="vct-device-row">
                        <label>Microphone</label>
                        <select name="microphone"></select>
                    </div>
                    <div id="speaker_dev" class="vct-device-row">
                        <label>Speaker</label>
                        <select name="speaker"></select>
                    </div>
                    <div id="camera_dev" class="vct-device-row">
                        <label>Camera</label>
                        <select name="camera"></select>
                    </div>
                    <button id="select_devices_done_btn" class="vct-btn vct-btn-primary" type="button">Done</button>
                </form>
            </div>

            <!-- Device test panel (mic, speaker, camera preview) -->
            <div id="c2c_device_test_div" class="vct-device-test" style="display:none;">
                <div class="vct-device-test-header">
                    <span>Device Test</span>
                    <button id="c2c_device_test_close_btn" class="vct-device-test-close">&times;</button>
                </div>
                <div class="vct-device-test-body">
                    <!-- Camera preview -->
                    <div class="vct-device-test-section">
                        <span class="vct-device-test-label">Camera Preview</span>
                        <div class="vct-device-test-camera-wrap">
                            <video id="c2c_camera_preview" autoplay playsinline muted></video>
                            <div id="c2c_camera_preview_placeholder" class="vct-device-test-placeholder">
                                <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5">
                                    <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
                                </svg>
                                <span>Camera preview</span>
                            </div>
                        </div>
                        <button id="c2c_camera_preview_btn" class="vct-device-test-btn">Start Camera</button>
                    </div>

                    <!-- Microphone test -->
                    <div class="vct-device-test-section">
                        <span class="vct-device-test-label">Microphone Test</span>
                        <div class="vct-device-test-meter-wrap">
                            <div class="vct-device-test-meter-bar">
                                <div id="c2c_mic_level_fill" class="vct-device-test-meter-fill" style="width:0%"></div>
                            </div>
                            <span id="c2c_mic_level_text" class="vct-device-test-meter-text">- dB</span>
                        </div>
                        <button id="c2c_mic_test_btn" class="vct-device-test-btn">Start Mic Test</button>
                    </div>

                    <!-- Speaker test -->
                    <div class="vct-device-test-section">
                        <span class="vct-device-test-label">Speaker Test</span>
                        <button id="c2c_speaker_test_btn" class="vct-device-test-btn">Play Test Sound</button>
                        <div class="vct-device-test-speaker-result" id="c2c_speaker_test_result"></div>
                    </div>
                </div>
            </div>
        </div>
        <!-- end widget -->

        <!-- Debug Log Panel (in-page, not overlay) -->
        <div id="c2c_debug_panel" class="vct-debug-panel" style="display:none;">
            <div class="vct-debug-header">
                <span>Debug Log</span>
                <div style="display:flex;gap:6px;">
                    <button id="c2c_debug_copy_btn" class="vct-debug-btn" title="Copy all logs">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                    </button>
                    <button id="c2c_debug_clear_btn" class="vct-debug-btn" title="Clear logs">
                        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                    </button>
                    <button id="c2c_debug_close_btn" class="vct-debug-btn" title="Close">&times;</button>
                </div>
            </div>
            <div id="c2c_debug_log" class="vct-debug-log"></div>
            <div class="vct-debug-footer">
                <span id="c2c_debug_status">Status: Idle</span>
                <button id="c2c_debug_diag_btn" class="vct-debug-btn" title="Run SBC connection diagnostic" style="width:auto;padding:0 8px;font-size:10px;gap:4px;">
                    <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
                    Test SBC
                </button>
            </div>
        </div>

        <!-- Keypad (DTMF) -->
        <div id="c2c_keypad_div" class="vct-keypad">
            <table id="c2c_keypad_table">
                <tr><td>1</td><td>2</td><td>3</td></tr>
                <tr><td>4</td><td>5</td><td>6</td></tr>
                <tr><td>7</td><td>8</td><td>9</td></tr>
                <tr><td>*</td><td>0</td><td>#</td></tr>
            </table>
        </div>
    </div>

</body>
</html>
