<!DOCTYPE html>
<!--
    Voice Team - Login Page (AD/LDAP Authentication)
-->
<html>
<head>
    <title>Voice Team - Login</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; form-action 'self'; connect-src 'self' https:">
    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <link rel="stylesheet" href="../css/c2c.css">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='80' font-size='80'%3E%F0%9F%94%90%3C/text%3E%3C/svg%3E">
    <style>
        /* ── Login Page Specific Styles ── */
        .vct-login-container {
            width: 390px;
            max-width: 100%;
            background: rgba(30, 30, 30, 0.7);
            backdrop-filter: blur(60px) saturate(1.4);
            -webkit-backdrop-filter: blur(60px) saturate(1.4);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 48px;
            padding: 40px 28px 36px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.15);
            position: relative;
            z-index: 1;
        }
        .vct-login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2) 30%, rgba(255,255,255,0.2) 70%, transparent);
            z-index: 2;
        }
        .vct-login-container::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 30px;
            background: #000;
            border-radius: 20px;
            z-index: 5;
            box-shadow: 0 0 0 1px rgba(255,255,255,0.05);
        }
        .vct-login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-top: 18px;
            margin-bottom: 32px;
        }
        .vct-login-logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 122, 255, 0.35);
        }
        .vct-login-logo-icon svg {
            width: 26px;
            height: 26px;
        }
        .vct-login-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.5px;
            text-align: center;
        }
        .vct-login-title strong {
            color: var(--primary-light);
        }
        .vct-login-subtitle {
            font-size: 13px;
            color: var(--text-tertiary);
            text-align: center;
            margin-bottom: 28px;
            letter-spacing: 0.3px;
        }
        .vct-login-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .vct-login-field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .vct-login-field label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .vct-login-field input {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 15px;
            color: var(--text-primary);
            font-family: inherit;
            outline: none;
            transition: all 0.25s ease;
        }
        .vct-login-field input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-glow);
            background: rgba(255, 255, 255, 0.08);
        }
        .vct-login-field input::placeholder {
            color: var(--text-tertiary);
        }
        .vct-login-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 14px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
            box-shadow: 0 8px 28px rgba(0, 122, 255, 0.3);
            margin-top: 6px;
            font-family: inherit;
        }
        .vct-login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 12px 36px rgba(0, 122, 255, 0.4);
        }
        .vct-login-btn:active {
            transform: scale(0.97);
        }
        .vct-login-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .vct-login-error {
            background: rgba(255, 69, 58, 0.12);
            border: 1px solid rgba(255, 69, 58, 0.25);
            border-radius: 12px;
            padding: 12px 16px;
            font-size: 13px;
            color: var(--danger);
            display: none;
            text-align: center;
        }
        .vct-login-error.show {
            display: block;
        }
        .vct-login-loading {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            color: var(--text-secondary);
        }
        .vct-login-loading.show {
            display: flex;
        }
        .vct-login-spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .vct-login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 11px;
            color: var(--text-tertiary);
        }
        .vct-login-footer a {
            color: var(--primary-light);
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="vct-login-container">
        <!-- Logo -->
        <div class="vct-login-logo">
            <div class="vct-login-logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="5" y="2" width="14" height="20" rx="3"/>
                    <line x1="12" y1="17" x2="12" y2="18"/>
                    <line x1="9" y1="6" x2="15" y2="6"/>
                    <path d="M17 11q3 0 3-3M4 11q-3 0-3-3M17 16q5 0 5-5M4 16q-5 0-5-5"/>
                </svg>
            </div>
            <div>
                <div class="vct-login-title">Voice <strong>Team</strong></div>
                <div class="vct-login-subtitle">Sign in to Click to Call</div>
            </div>
        </div>

        <!-- Login Form -->
        <form class="vct-login-form" id="loginForm" autocomplete="off">
            <div class="vct-login-error" id="loginError"></div>

            <div class="vct-login-field">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" autocomplete="username" required>
            </div>

            <div class="vct-login-field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password" required>
            </div>

            <button type="submit" class="vct-login-btn" id="loginBtn">
                <span id="loginBtnText">Sign In</span>
                <span class="vct-login-loading" id="loginLoading">
                    <span class="vct-login-spinner"></span> Authenticating...
                </span>
            </button>

            <!-- Auth0 / SSO divider (shown when OIDC is configured) -->
            <div id="auth0Section" style="display:none;margin-top:6px;">
                <div style="display:flex;align-items:center;gap:12px;margin:12px 0;">
                    <div style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></div>
                    <span style="font-size:11px;color:var(--text-tertiary);letter-spacing:1px;text-transform:uppercase;">or continue with SSO</span>
                    <div style="flex:1;height:1px;background:rgba(255,255,255,0.08);"></div>
                </div>
                <a id="auth0LoginBtn" href="/api/auth/login" style="display:flex;align-items:center;justify-content:center;gap:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:14px;color:var(--text-primary);text-decoration:none;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.25s ease;font-family:inherit;" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background='rgba(255,255,255,0.06)'">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    Sign in with Okta / SSO
                </a>
            </div>

        </form>

        <div class="vct-login-footer">
            Powered by Voice Team &bull; WebRTC Click to Call
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginLoading = document.getElementById('loginLoading');
            const loginError = document.getElementById('loginError');

            // Check if already authenticated
            fetch('/api/session', { credentials: 'same-origin' })
                .then(r => r.json())
                .then(data => {
                    if (data.authenticated) {
                        // Already logged in — redirect to main page
                        window.location.href = '/';
                    }
                })
                .catch(() => {});

            // Check if OIDC (Okta/Auth0) is configured
            fetch('/api/auth/status', { credentials: 'same-origin' })
                .then(r => r.json())
                .then(data => {
                    if (data.oidcEnabled) {
                        const section = document.getElementById('auth0Section');
                        if (section) section.style.display = 'block';
                    }
                })
                .catch(function(err) {
                    // If /api/auth/status fails (e.g. Render cold start), retry after 2s
                    setTimeout(function() {
                        fetch('/api/auth/status', { credentials: 'same-origin' })
                            .then(function(r) { return r.json(); })
                            .then(function(data) {
                                if (data.oidcEnabled) {
                                    var s = document.getElementById('auth0Section');
                                    if (s) s.style.display = 'block';
                                }
                            })
                            .catch(function() {});
                    }, 2000);
                });

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = usernameInput.value.trim();
                const password = passwordInput.value.trim();

                if (!username || !password) {
                    showError('Please enter both username and password.');
                    return;
                }

                // Show loading state
                setLoading(true);
                hideError();

                try {
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        credentials: 'same-origin',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username, password })
                    });

                    const data = await response.json();

                    if (data.success) {
                        // Login successful — redirect to main page
                        window.location.href = '/';
                    } else {
                        showError(data.error || 'Invalid username or password.');
                        setLoading(false);
                    }
                } catch (err) {
                    showError('Connection error. Please check that the server is running.');
                    setLoading(false);
                }
            });

            function setLoading(loading) {
                if (loading) {
                    loginBtn.disabled = true;
                    loginBtnText.style.display = 'none';
                    loginLoading.classList.add('show');
                } else {
                    loginBtn.disabled = false;
                    loginBtnText.style.display = 'inline';
                    loginLoading.classList.remove('show');
                }
            }

            function showError(msg) {
                loginError.textContent = msg;
                loginError.classList.add('show');
            }

            function hideError() {
                loginError.classList.remove('show');
                loginError.textContent = '';
            }

            // Allow pressing Enter to submit
            passwordInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') form.dispatchEvent(new Event('submit'));
            });
        })();
    </script>
</body>
</html>
